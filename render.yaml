services:
  - type: web
    name: legisllm-app
    runtime: docker
    plan: starter
    region: oregon
    repo: https://github.com/YOUR_USERNAME/LegisLLM_v2
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPINFRA_API_KEY
        sync: false
      - key: BACKEND_URL
        value: http://localhost:8000
    healthCheckPath: /
